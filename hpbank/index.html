<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="operation.js"></script>

</head>

<body>
  <main>
    <h1>HERMES BANK</h1>
    <h2>Cálculo de Empréstimo</h2>
    <hr style="margin: 0; border: 0; border-top: 2px solid #ffffff; height: 0;"> <br>
    <label>DIGITE O VALOR EMPRESTADO</label>
    <input type="float" id="vEmprestado" placeholder="R$ toque aqui" fixed min="0" required> <br>
    <label>DIGITE A PORCENTAGEM</label>
    <input type="float" id="pctgem" required placeholder="% toque aqui">
    <button type="button" id="calcular" onclick="calcular()">CALCULAR</button>
    <br>
    <label>VALOR A RECEBER</label>
    <input type="float" id="vRecebido" value="R$ " disabled> <br>
    <label>VALOR DO JUROS</label>
    <input type="float" id="vJuros" value="R$ " disabled>
    <button id="limpar" onclick="limpar()">LIMPAR</button>
  </main>
</body>

</html>
